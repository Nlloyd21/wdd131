<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>

    <meta property="og:type" content="Recipe Book Website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="This website features different recipes to try with rating">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">


    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="This website features different recipes to try with rating">
    <meta name="twitter:image" content="social-preview-image.png">

    <link rel="icon" href="/favicon.ico">


    <link rel="apple-touch-icon" href="images/recipe-book.png">
                
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="recipe-book.css">
</head>
<body>
    <header>
        <div class="website-title">
            <img src="images/recipe-book.png" alt="Recipe book logo">
            <h1 class="recipe-book-title">Recipebook</h1>
        </div>
        <form class="search-container">
            <input type="text" placeholder="Find a recipe" class="search-input">
            <button class="search-button">
                <img src="images/search.svg" alt="search icon">
            </button>
        </form>
        <hr>
    </header>
    <main>
        <section class="recipe-card">
            <img src="images/apple-crisp.jpg" alt="Apple Crisp">
            <div class="recipe-info">
                <span class="tag">
                    dessert
                </span>
                <h2>
                    Apple Crisp
                </h2>  
                <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>
                <p class="recipe-description">
                    This apple crisp recipe is a simple yet delicious fall dessert
                    that's great served warm with vanilla ice cream.
                </p>
            </div>
        </section>
    </main>
    <footer>
        
<a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon<a>                   
                
        <div class="social-icons">
            <a href="#">
                <img src="images/instagram_icon.svg" alt="Instagram">
            </a>
            <a href="#">
                <img src="images/youtube_icon.svg" alt="Youtube">
            </a>
            <a href="#">
                <img src="images/pinterest_icon.svg" alt="Pinterest">
            </a>
            
        </div>
    </footer>
</body>
</html>
