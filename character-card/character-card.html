<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="This is a character card that has an attack and level button">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="Snortleblat Monster">
    <meta name="twitter:title" content="Snortleblat">
    <meta name="twitter:description" content="This is a character card that has an attack and level button">
    <meta name="twitter:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="snortleblat.webp">
        
    <title>Character Card</title>
    <script src="character-card.js" defer></script>
    <link rel="stylesheet" href="character-card.css">
</head>
<body>
    <div class="card">
        <div class="image">
            <img src="snortleblat.webp" alt="snortleblat monster in a swamp">
        </div>
        <div class="name">
            <p>Snortleblat</p>
        </div>
        <div class="stats">
            <p>Class:<span class="class-name"> Swamp Beast</span></p>
            <p>Level:<span class="level">5</span></p>
            <p>Health:<span class="health">100</span></p>
        </div>
        <div class="buttons">
            <button id="attack-btn">Attacked</button>
            <button id="levelUp-btn">Level Up</button>
        </div>
    </div>
</body>
</html>
