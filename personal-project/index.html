<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cruise Cabin Comparison</title>
    <link rel="stylesheet" href="index.css">
    <script src="compare.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="menu">
            <!-- <a id="logo" href="index.html">
            <img src="images/gemini-svg.svg" alt="Carnival Panorama Logo"> -->
            <a href="#">Home</a>
            <a href="#">Stateroom Tool</a>
            <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1" target="_blank">Book Now</a>
        </nav>
    </header>
    
    <div></div>

    <section class="comparison-container">
        <div class="card" id="card-a">
            <label for="select-a">Select Stateroom A:</label>
            <select class="room-selector" id="select-a">
                <option value="select-room">Select a room...</option>
                <option value="interior">Interior</option>
                <option value="ocean-view">Ocean View</option>
                <option value="balcony">Balcony</option>
                <option value="suite">Suite</option>
            </select>
            <div id="details-a" class="hidden">
            </div>
        </div>

        <div class="compare-control">
            <label for="highlight">Compare By:</label>
            <select id="highlight">
                <option value="">Choose Criteria...</option>
                <option value="price">Cheapest Price</option>
                <option value="capacity">Most Capacity</option>
                <option value="size">Biggest Size</option>

            </select>
        </div>
        <div class="card" id="card-b">
            <label for="select-b">Select Stateroom B:</label>
            <select class="room-selector" id="select-b">
                <option value="select-room">Select a room...</option>
                <option value="interior">Interior</option>
                <option value="ocean-view">Ocean View</option>
                <option value="balcony">Balcony</option>
                <option value="suite">Suite</option>
            </select>
            <div id="details-b" class="hidden">
            </div>
        </div>
    </section>

    <footer>
        <div></div>
    </footer>
</body>

</html>
